link:
  - https://www.douyin.com/user/MS4wLjABAAAA6O7EZyfDRYXxJrUTpf91K3tmB4rBROkAw-nYMfld8ss

path: ./Downloaded/

music: true
cover: true
avatar: true
json: true

start_time: ""
end_time: ""

folderstyle: true

mode:
  - post

number:
  post: 1
  like: 0
  allmix: 0
  mix: 0
  music: 0
  collect: 0
  collectmix: 0

increase:
  post: false
  like: false
  allmix: false
  mix: false
  music: false

thread: 5
retry_times: 3
proxy: ""
database: true
database_path: dy_downloader.db

progress:
  quiet_logs: true

transcript:
  enabled: false
  model: gpt-4o-mini-transcribe
  output_dir: ""
  response_formats:
    - txt
    - json
  api_url: https://api.openai.com/v1/audio/transcriptions
  api_key_env: OPENAI_API_KEY
  api_key: ""

# Subtitle pipeline（可选）：dịch SRT → ASS → che subtitle cũ → burn vào video
subtitle:
  enabled: false
  output_dir: ""
  ffmpeg_path: ffmpeg
  ffprobe_path: ""
  fonts_dir: ./fonts
  translate:
    enabled: true
    source_lang: zh
    target_lang: vi
    backend: noop       # noop|argos|ollama
    batch_size: 20
    timeout_seconds: 120
    preserve_line_breaks: true
    ollama_url: http://localhost:11434
    ollama_model: qwen2.5:7b
    api_key_env: OPENAI_API_KEY
  style:
    preset: douyin_vi
    presets:
      douyin_vi:
        font: Noto Sans
        font_size: 42
        primary_color: "&H00FFFFFF"
        secondary_color: "&H000000FF"
        outline_color: "&H00000000"
        back_color: "&H99000000"
        outline: 2
        shadow: 1
        border_style: 1
        alignment: 2
        margin_l: 40
        margin_r: 40
        margin_v: 70
        wrap_style: 0
  mask:
    mode: none          # none|box|blur|crop
    rect: ""            # "x,y,w,h"
    box_color: black@0.85
    blur_strength: 12
  burn:
    enabled: false
    video_codec: libx264
    audio_codec: copy
    crf: 18
    preset: medium

browser_fallback:
  enabled: true
  headless: false
  max_scrolls: 240
  idle_rounds: 8
  wait_timeout_seconds: 600

# 评论采集（可选）：启用后每个作品会额外生成 *_comments.json
comments:
  enabled: false
  include_replies: false
  max_comments: 0   # 0 = 不限
  page_size: 20

# 直播录制（可选）：当 link 指向 live.douyin.com/{room_id} 或 /follow/live/{room_id} 时生效
live:
  max_duration_seconds: 0   # 0 = 录到主播下播
  chunk_size: 65536
  idle_timeout_seconds: 30

# 下载完成通知（可选）。providers 支持 bark / telegram / webhook
notifications:
  enabled: false
  on_success: true
  on_failure: true
  providers: []
  # 示例：
  # providers:
  #   - type: bark
  #     url: https://api.day.app/YOUR_DEVICE_KEY
  #     sound: bell
  #   - type: telegram
  #     bot_token: "123456:ABC..."
  #     chat_id: "987654321"
  #   - type: webhook
  #     url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx
  #     extra_body:
  #       msgtype: text

# REST API 服务模式（可选，需额外安装 fastapi + uvicorn）
server:
  max_jobs: 500
  job_ttl_seconds: 86400   # 完成态 job 保留 24 小时

cookies:
  msToken: YOUR_MS_TOKEN
  ttwid: YOUR_TTWID
  odin_tt: YOUR_ODIN_TT
  passport_csrf_token: YOUR_CSRF_TOKEN
  sid_guard: YOUR_SID_GUARD
